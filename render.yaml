services:
  - type: web
    name: pickr-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SERPAPI_KEY_1
        sync: false
      - key: SERPAPI_KEY_2
        sync: false
      - key: TAVILY_API_KEY_1
        sync: false
      - key: TAVILY_API_KEY_2
        sync: false
      - key: TAVILY_API_KEY_3
        sync: false
      - key: HUGGINGFACE_API_TOKEN_1
        sync: false
      - key: HUGGINGFACE_API_TOKEN_2
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
